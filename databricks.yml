    default: true
    workspace:
      host: https://adb-5253031431851369.9.azuredatabricks.net
    variables:
      catalog: 1_dev

  uat:
    mode: production
    workspace:
      host: https://adb-5253031431851369.9.azuredatabricks.net
    variables:
      catalog: 2_uat      

  prod:
    mode: production
    workspace:
      host: https://adb-5253031431851369.9.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/navallyemul@gmail.com to make sure we only have a single copy.
      #production
      root_path: /Workspace/Users/navallyemul@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
